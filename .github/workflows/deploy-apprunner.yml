name: Deploy to AppRunner

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: 'Docker image tag to deploy'
        required: true
        default: 'latest'
  workflow_call:
    inputs:
      image-tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string
        default: 'latest'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: nasgul951/wine-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Configure AWS credentials
        id: configure-aws
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy AppRunner service
        env:
          IMAGE_URI: ${{ steps.configure-aws.outputs.aws-account-id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ inputs.image-tag }}
          APPRUNNER_SERVICE_ARN: ${{ secrets.APPRUNNER_SERVICE_ARN }}
        run: |
          echo "Deploying AppRunner service with image: $IMAGE_URI"

          SOURCE_CONFIG=$(jq -n \
            --arg uri "$IMAGE_URI" \
            '{"ImageRepository":{"ImageIdentifier":$uri,"ImageRepositoryType":"ECR"}}')

          aws apprunner update-service \
            --service-arn "$APPRUNNER_SERVICE_ARN" \
            --source-configuration "$SOURCE_CONFIG" \
            --region ${{ env.AWS_REGION }}

      - name: Wait for AppRunner deployment
        env:
          APPRUNNER_SERVICE_ARN: ${{ secrets.APPRUNNER_SERVICE_ARN }}
        run: |
          while true; do
            STATUS=$(aws apprunner describe-service \
              --service-arn "$APPRUNNER_SERVICE_ARN" \
              --region ${{ env.AWS_REGION }} \
              --query 'Service.Status' \
              --output text)

            echo "Current status: $STATUS"

            if [ "$STATUS" = "RUNNING" ]; then
              echo "AppRunner service is running!"
              break
            elif [ "$STATUS" = "OPERATION_IN_PROGRESS" ]; then
              sleep 30
            else
              echo "Deployment failed with status: $STATUS"
              exit 1
            fi
          done
